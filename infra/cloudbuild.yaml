# ============================================================
# CyberLoop — Cloud Build CI/CD
# ============================================================
# Trigger: push to main branch
#
# Setup:
#   gcloud builds triggers create github \
#     --repo-name=cyberloop \
#     --repo-owner=obadiaha \
#     --branch-pattern="^main$" \
#     --build-config=infra/cloudbuild.yaml
# ============================================================

substitutions:
  _REGION: us-central1
  _REPO: cyberloop
  _BACKEND_SERVICE: cyberloop-api
  _FRONTEND_SERVICE: cyberloop-web
  _BUCKET_NAME: ${PROJECT_ID}-data

steps:
  # ---- Step 1: Build backend Docker image ----
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend/'

  # ---- Step 2: Push backend image ----
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api'

  # ---- Step 3: Deploy backend to Cloud Run ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--cpu'
      - '1'
      - '--memory'
      - '2Gi'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GCS_BUCKET_NAME=${_BUCKET_NAME}'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest'
      - '--session-affinity'

  # ---- Step 4: Build frontend ----
  - name: 'node:18-slim'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci --silent
        export VITE_API_URL="https://${_BACKEND_SERVICE}-${PROJECT_ID}.${_REGION}.run.app"
        npm run build

  # ---- Step 5: Build frontend Docker image ----
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend-image'
    waitFor: ['build-frontend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Create Nginx config inline
        cat > frontend/nginx.conf << 'EOF'
        server {
            listen 8080;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;
            location / { try_files $$uri $$uri/ /index.html; }
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$$ { expires 1y; add_header Cache-Control "public, immutable"; }
            gzip on;
            gzip_types text/plain text/css application/json application/javascript text/xml;
        }
        EOF

        cat > frontend/Dockerfile.cloud << 'EOF'
        FROM nginx:1.25-alpine
        RUN rm /etc/nginx/conf.d/default.conf
        COPY nginx.conf /etc/nginx/conf.d/
        COPY dist/ /usr/share/nginx/html/
        EXPOSE 8080
        CMD ["nginx", "-g", "daemon off;"]
        EOF

        docker build \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:latest \
          -f frontend/Dockerfile.cloud \
          frontend/

  # ---- Step 6: Push frontend image ----
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend-image']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web'

  # ---- Step 7: Deploy frontend to Cloud Run ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--cpu'
      - '1'
      - '--memory'
      - '256Mi'

  # ---- Step 8: Upload data to Cloud Storage ----
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'upload-data'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -d "backend/data" ]; then
          gsutil -m cp -r backend/data/* gs://${_BUCKET_NAME}/
        fi

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/api:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/web:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
